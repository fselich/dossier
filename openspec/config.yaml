schema: spec-driven

context: |
  All artifacts (proposals, designs, specs, tasks) must be written in English.

  Tech stack: Go 1.25, Bubble Tea (Elm-architecture TUI), Bubbles, Glamour, Lipgloss.
  Domain: terminal UI tool for navigating OpenSpec project artifacts (proposals, designs, specs, tasks).
  The project itself follows OpenSpec (spec-driven development): changes live under openspec/changes/, long-lived specs under openspec/specs/.

rules:
  proposal:
    - Always include a "Non-goals" section to make scope boundaries explicit
    - Keep proposals concise; prefer bullet points over prose
  tasks:
    - Break tasks into small, independently completable steps
    - When applicable, include a task for writing or updating tests
